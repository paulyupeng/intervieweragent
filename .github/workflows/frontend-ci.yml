name: Frontend CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'frontend/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t interviewer-agent-frontend ./frontend
