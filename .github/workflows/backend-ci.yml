name: Backend CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install mypy

      - name: Type check with mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t interviewer-agent-backend ./backend

      - name: Test Docker image
        run: |
          docker run --rm interviewer-agent-backend python -c "from app.main import app; print('OK')"
