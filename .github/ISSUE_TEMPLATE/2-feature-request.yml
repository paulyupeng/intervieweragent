name: Feature Request
description: 建议一个新功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请详细描述你的想法。

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 可选，方便我们进一步沟通
      placeholder: your.email@example.com
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能想解决什么问题？
      placeholder: 目前面试结束后无法导出报告，HR 需要手动记录...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何实现这个功能？
      placeholder: 在面试结果页面添加"导出 PDF"按钮...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 有没有其他可行的解决方案？
      placeholder: 或者支持导出 Excel 格式...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能的重要程度
      options:
        - 低（有了更好）
        - 中（可以显著改善体验）
        - 高（必须实现）
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: 预估工作量
      description: 你预估实现这个功能需要多少工作量？
      options:
        - 小（< 1 天）
        - 中（1-3 天）
        - 大（> 3 天）
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 额外信息
      description: 任何相关的截图、设计稿、参考链接等
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      description: 提交前请确认
      options:
        - label: 我已搜索现有 Issue，确认这不是重复的建议
          required: true
